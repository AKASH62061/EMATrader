services:
  - type: web
    name: ema-trader-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://ema-trader-pgs8.vercel.app
    healthCheckPath: /api/health
    # Keep the service alive (upgrade from free tier to avoid sleep)
    # Free tier sleeps after 15 min of inactivity
